name: AI factory implementation

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Existing authorized issue number
        required: true
        type: number

jobs:
  implement:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.label.name == 'ai:build' }}
    permissions:
      actions: write
      contents: write
      issues: write
      pull-requests: write
      statuses: write
    uses: shanchaudary/shans-ai-software-factory/.github/workflows/reusable-implement.yml@be5412f3e3e85ecdf40d65078cddeae5db5b3a20
    with:
      issue_number: ${{ github.event_name == 'workflow_dispatch' && inputs.issue_number || github.event.issue.number }}
      factory_ref: be5412f3e3e85ecdf40d65078cddeae5db5b3a20
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
