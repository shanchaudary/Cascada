name: AI factory supervisor

on:
  workflow_run:
    workflows: ["Cascada CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      ci_run_id:
        description: Existing completed consumer CI workflow run ID
        required: true
        type: number

jobs:
  supervise:
    permissions:
      actions: write
      contents: write
      issues: write
      pull-requests: write
      statuses: write
    uses: shanchaudary/shans-ai-software-factory/.github/workflows/reusable-supervise.yml@98033aa4780fac52a58b6aab7a692489e1e25e96
    with:
      ci_run_id: ${{ github.event_name == 'workflow_dispatch' && inputs.ci_run_id || github.event.workflow_run.id }}
      factory_ref: 98033aa4780fac52a58b6aab7a692489e1e25e96
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
